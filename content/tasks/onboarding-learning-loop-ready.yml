slug: onboarding-learning-loop-ready
title: "Настроить weekly learning loop"
summary: Зафиксировать реалистичный недельный учебный ритм с чёткими входом, выходом и fallback-правилом.
instructions: |
  Подготовь файл notes/weekly-learning-loop.md и оформи рабочий weekly learning loop:

  1) добавь расписание минимум из 4 учебных сессий (день + длительность + фокус);
  2) опиши стартовый ритуал сессии (2-3 конкретных шага);
  3) опиши закрывающий ритуал сессии (2-3 конкретных шага);
  4) добавь fallback-правило, как ты возвращаешься в ритм после пропуска дня.

  В submission вставь содержимое файла или ссылку на commit с этим файлом.
submission_type: text
definition_of_done:
  - В weekly-плане указаны минимум 4 сессии с днями и длительностью.
  - Стартовый и закрывающий ритуалы описаны конкретными действиями.
  - Есть отдельное fallback-правило на случай срыва графика.
  - В ответе есть артефакт (текст или ссылка), позволяющий проверить план без уточнений.
review_mode: manual
hints:
  - Лучше 4 стабильные сессии, чем 7 нереалистичных.
  - "Формулируй шаги действиями: открыть, запустить, записать, проверить."
