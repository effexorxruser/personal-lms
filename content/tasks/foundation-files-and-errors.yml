slug: foundation-files-and-errors
title: Файлы и обработка ошибок
summary: Считать данные из файла, сформировать итоговый отчет и обработать типовые I/O ошибки.
instructions: |
  Создай скрипт `todo_summary.py`.

  Шаг 1:
  Прочитай `todo.txt` и выведи содержимое в консоль.

  Шаг 2:
  Добавь подсчет непустых строк.

  Шаг 3:
  Запиши итог в `todo_report.txt` в формате `total_items=<N>`.

  Шаг 4:
  Добавь обработку ошибок.

  Скрипт должен:
  1) Читать файл `todo.txt`.
  2) Игнорировать пустые строки.
  3) Подсчитывать число непустых задач.
  4) Писать результат в `todo_report.txt` в формате `total_items=<N>`.

  Обязательная обработка ошибок:
  - отсутствие `todo.txt`;
  - проблемы чтения/записи файла.

  В ошибочном сценарии печатай понятное сообщение без traceback.
  Добавь минимум 1 manual test case: конкретный входной файл и ожидаемый текст `todo_report.txt`.
submission_type: command_output
definition_of_done:
  - "todo_report.txt создается для валидного входа."
  - Итоговый подсчет корректен и воспроизводим.
  - Отсутствие входного файла обрабатывается через except.
  - Скрипт не падает на пустых строках.
review_mode: deterministic
hints:
  - Используй with open(...) для чтения и записи.
  - Сначала собери отфильтрованный список строк, потом считай длину.
  - Для проверки сделай `todo.txt` с 2 непустыми строками и 1 пустой.
