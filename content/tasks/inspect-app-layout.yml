slug: inspect-app-layout
title: "Проверить структуру приложения"
summary: Зафиксировать, где в текущем проекте находятся routers, services, templates и file-based content.
instructions: |
  Открой локальный репозиторий и коротко опиши, какие файлы отвечают за маршрут урока, загрузку контента и runtime progress.

  Результат должен быть практическим: не пересказывай весь проект, а покажи, что ты можешь найти нужный слой и объяснить его ответственность.
submission_type: text
definition_of_done:
  - Указан router, который показывает страницу урока.
  - Указан loader или registry, который читает content из файлов.
  - Указан service или model, который отвечает за progress runtime.
  - Есть 2-4 предложения о том, почему content и runtime state разделены.
review_mode: deterministic
hints:
  - Начни с `app/routers/content.py`.
  - Затем проверь `app/content_loader.py` и `app/services/progress_service.py`.
terminal:
  enabled: true
  presets:
    - label: "Показать помощь"
      command: "help"
    - label: "Проверить Python"
      command: "python --version"
    - label: "Показать задание"
      command: "show task"
    - label: "Запустить файл урока"
      command: "python run lesson"
  allow_manual_input: true
  allowed_commands:
    - help
    - pwd
    - tree
    - python
    - pytest
    - show
