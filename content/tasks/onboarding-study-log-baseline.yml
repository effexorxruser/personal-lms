slug: onboarding-study-log-baseline
title: "Собрать baseline учебного журнала"
summary: Создать структурированный study log с тремя проверяемыми записями о выполненных учебных сессиях.
instructions: |
  Создай notes/study-log.md и внеси минимум 3 записи по шаблону:

  - дата;
  - цель сессии;
  - выполненные команды/шаги;
  - наблюдаемый результат;
  - blocker (если был) и способ обхода;
  - следующий шаг.

  В submission приложи текст трёх записей или ссылку на commit, где они зафиксированы.
submission_type: text
definition_of_done:
  - В журнале есть минимум 3 отдельные записи.
  - Каждая запись содержит наблюдаемый результат (вывод, файл, ссылка, факт выполнения).
  - Минимум в одной записи отражён blocker и конкретный способ решения.
  - У каждой записи указан следующий шаг, который можно выполнить в следующей сессии.
review_mode: deterministic
hints:
  - Пиши коротко, но с фактами, которые можно проверить.
  - 'Не оставляй поле "следующий шаг" пустым: это ключ к непрерывности цикла.'
