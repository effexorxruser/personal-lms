slug: foundation-workspace-ready
title: "Подготовить workspace и проверить стартовый цикл"
summary: Зафиксировать рабочую папку, запуск Python и короткий run-log по первым командам.
instructions: |
  Создай учебную папку foundation-workspace и выполни базовые команды:

  1) проверь рабочую директорию;
  2) проверь версию Python;
  3) зайди в REPL, выполни 2+2 и print("foundation");
  4) сохрани короткий лог в notes/foundation-log.txt.

  В submission приложи путь к workspace, команды и наблюдаемый результат.
submission_type: text
definition_of_done:
  - Указан путь рабочей директории, где выполнялись команды.
  - Указан результат проверки версии Python.
  - Указан факт выполнения двух команд в REPL и их вывод.
  - Есть 1-2 предложения с формулировкой следующего шага после старта.
review_mode: deterministic
hints:
  - Если python не найден, проверь python3.
  - Записывай команды и вывод сразу, не по памяти.
