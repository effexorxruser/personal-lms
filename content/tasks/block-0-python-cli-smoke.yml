slug: block-0-python-cli-smoke
title: "Block 0: Первый Python CLI smoke запуск"
summary: Проверить базовый путь от скрипта к наблюдаемому CLI-результату в рамках onboarding-блока.
instructions: |
  В своём учебном workspace создай или обнови файл scripts/hello_cli.py:

  1) добавь аргумент `--name`;
  2) выведи приветствие с переданным именем;
  3) выполни минимум два запуска с разными значениями `--name`;
  4) выполни запуск с `--help`.

  Сохрани команды и вывод в notes/foundation-log.txt.
  В submission приложи текст лога или ссылку на commit.
submission_type: text
definition_of_done:
  - В `scripts/hello_cli.py` реализован аргумент `--name`.
  - Есть минимум два запуска с разными значениями `--name` и валидным выводом.
  - В логе есть отдельный блок с выводом `--help`.
  - Submission содержит проверяемый артефакт (текст или ссылка).
review_mode: deterministic
hints:
  - Начни с простого argparse-парсера без subcommands.
  - "Перед запуском проверь путь: команда должна выполняться из корня workspace."
