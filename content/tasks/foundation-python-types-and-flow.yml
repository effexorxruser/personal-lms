slug: foundation-python-types-and-flow
title: Python типы и управляющий поток
summary: Написать CLI-скрипт, который классифицирует числовой ввод по диапазонам и корректно обрабатывает ошибки.
instructions: |
  Создай файл `score_label.py`.

  Требования:
  1) Читай одно значение через input().
  2) Преобразуй ввод к числу.
  3) Для диапазонов 90+, 75-89, 60-74, <60 выдай метку качества.
  4) Для нечислового ввода покажи понятное сообщение об ошибке без traceback.
  5) Для значений вне диапазона 0..100 покажи отдельное сообщение о невалидном диапазоне.
  6) Добавь короткий комментарий в коде, где обрабатывается edge case.

  Проверь скрипт минимум на 5 разных входах.
  Зафиксируй как минимум 2 конкретных test case (вход + ожидаемый вывод) в комментарии или отдельной заметке.
submission_type: command_output
definition_of_done:
  - Скрипт запускается локально через python3 score_label.py.
  - Все диапазоны возвращают ожидаемые метки.
  - Невалидный ввод не вызывает падение.
  - Пользовательский вывод понятен и не перегружен.
review_mode: deterministic
hints:
  - Используй if/elif/else с проверкой диапазонов по убыванию.
  - Оберни преобразование ввода в try/except ValueError.
  - "Сначала запусти минимальную версию: input -> int -> одна проверка >= 90, затем расширяй по шагам."
