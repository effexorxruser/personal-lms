slug: block-1-python-core-checkpoint
title: Block 1 Checkpoint — Python CLI Utilities
summary: Интеграционный checkpoint по Python core, функциям, файловому вводу/выводу и обработке ошибок.
module_slug: block-1-python-core
description: Собрать одну практичную CLI-утилиту на Python с базовой обработкой ошибок и воспроизводимым запуском.
project_description: |
  Сделай одну основную CLI-утилиту, которая закрывает базовые навыки модуля:
  - работа с типами и управляющим потоком;
  - декомпозиция на функции и модули;
  - чтение/запись файлов;
  - базовая обработка исключений.

  Минимум: утилита должна генерировать файл-отчет по входным данным.
  Опционально: можно добавить второй маленький скрипт как stretch-расширение.
requirements:
  - Код разделен минимум на entrypoint и модуль с логикой.
  - Основной запуск выполняется через python <script>.py.
  - Есть обработка как минимум одного ошибочного сценария.
  - Есть краткий README с командами запуска.
deliverables:
  - Папка с исходниками основной CLI-утилиты.
  - README с 1 успешным и 1 ошибочным примером запуска.
  - Пример входного файла и соответствующий выходной отчет.
evaluation_criteria:
  - Корректность результата на базовом валидном входе.
  - Контролируемое поведение на невалидном входе.
  - Понятная структура кода (entrypoint + reusable functions).
  - Воспроизводимый запуск по README без скрытых шагов.
definition_of_done:
  - Утилита запускается локально по инструкциям из README.
  - Есть минимум один подтвержденный успешный запуск.
  - Есть минимум один подтвержденный ошибочный запуск с понятным сообщением.
  - Выходной отчет создается и содержит ожидаемые поля.
submission_type: repository_link
portfolio_expectations:
  - Артефакт можно показать как первый практический Python CLI проект.
  - Видно базовое владение Python core, модульностью и обработкой ошибок.
hints:
  - Начни с одной утилиты и доведи ее до стабильного состояния, затем добавляй остальные.
  - Держи функцию короткой, если она делает больше одной задачи.
