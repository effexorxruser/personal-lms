    title: Python backend core
    modules: []
  - block: 3
    title: Data and SQL
    modules: []
  - block: 4
    title: FastAPI and services
    modules: []
  - block: 5
    title: Reliability and delivery
    modules: []
  - block: 6
    title: AI integration
    modules: []
source_registry: content/sources/source_registry.yml
artifacts:
