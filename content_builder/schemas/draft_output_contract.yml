version: "1"
applies_to:
  - module.yml
  - lesson.md
  - task.yml
  - checkpoint.yml

lesson:
  front_matter_required:
    - key
    - title
    - summary
    - objectives
    - checklist
    - task_slug
    - source_ids
  required_sections:
    - Why this matters (RU)
    - What to read (EN source)
    - What to skip
    - Action
    - Definition of Done
    - Technical English
  knowledge_base_required_sections:
    - Core idea (RU)
    - Runnable example
    - Run and expected output
    - Частые ошибки
    - Как это связано с задачей
  micro_step_policy:
    sequence: tiny-example -> explanation -> larger-example -> task-bridge
    early_modules_first_example_minimal: true
    early_modules_no_type_hints_in_first_example: true
  markdown_code_fence_policy:
    opening_fence_has_language_marker: true
    code_starts_on_next_line: true
    closing_fence_on_own_line: true
  media_policy:
    one_of:
      - Optional media
      - No media needed
  source_policy:
    what_to_read_is_optional_deep_dive: true
    no_manual_source_hunting: true

task:
  required_fields:
    - slug
    - title
    - summary
    - instructions
    - submission_type
    - definition_of_done
    - review_mode
    - hints
  optional_fields:
    - terminal

checkpoint:
  required_fields:
    - slug
    - title
    - summary
    - module_slug
    - description
    - project_description
    - requirements
    - deliverables
    - evaluation_criteria
    - definition_of_done
    - submission_type
    - portfolio_expectations
    - hints
