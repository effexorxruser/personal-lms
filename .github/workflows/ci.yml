name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  python-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Validate content
        run: python scripts/validate_content.py

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t personal-lms:ci .

      - name: Docker compose smoke check
        run: |
          cp .env.example .env
          if ! grep -q '^PERSONAL_LMS_SESSION_SECRET_KEY=' .env; then
            echo "PERSONAL_LMS_SESSION_SECRET_KEY=ci-test-secret-key-change-me" >> .env
          fi
          echo "PERSONAL_LMS_AI_HELPER_ENABLED=false" >> .env
          docker compose up --build -d
          for i in {1..20}; do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed"
          docker compose logs app
          exit 1

      - name: Tear down docker compose
        if: always()
        run: docker compose down || true
