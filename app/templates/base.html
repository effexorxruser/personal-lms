<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}personal-lms{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    <script src="{{ url_for('static', path='/js/app.js') }}" defer></script>
  </head>
  <body>
    <div class="page-bg bg-shell" aria-hidden="true">
      <div class="page-bg__base"></div>
      <div class="page-bg__image"></div>
      <div class="page-bg__glow overlay-soft"></div>
      <div class="page-bg__noise overlay-grid"></div>
    </div>

    {% if not disable_topbar %}
    <header class="topbar">
      <div class="topbar__inner">
        <a href="/dashboard" class="brand">personal-lms</a>
        <nav class="topbar__nav" aria-label="Основная навигация">
          <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}is-active{% endif %}">Главная</a>
          <a href="{{ nav_course_href if nav_course_href is defined else '/courses/python-backend-ai' }}" class="nav-link {% if request.url.path.startswith('/courses/') %}is-active{% endif %}">Курс</a>
          <a href="{{ nav_lessons_href if nav_lessons_href is defined else '/lessons/foundation-intro' }}" class="nav-link {% if request.url.path.startswith('/lessons/') %}is-active{% endif %}">Уроки</a>
        </nav>
        <div class="topbar__actions">
          {% if request.session.get('user_id') %}
          <form method="post" action="/logout">
            <button type="submit" class="btn btn--ghost btn--sm">Выход</button>
          </form>
          {% else %}
          <a href="/login" class="btn btn--ghost btn--sm">Выход</a>
          {% endif %}
        </div>
      </div>
    </header>
    {% endif %}

    <main class="page-shell {% if disable_topbar %}page-shell--auth{% endif %}">
      <div class="page-stack">
        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
