{% extends "base.html" %}

{% block title %}Вход | personal-lms{% endblock %}

{% block content %}
<section class="auth-shell" aria-labelledby="login-title">
  <div class="auth-card">
    <p class="eyebrow">personal-lms</p>
    <h1 id="login-title">Вход в систему</h1>
    <p class="auth-copy">Введите учетные данные, чтобы открыть панель обучения.</p>
    {% if error_message %}
    <p class="auth-error" role="alert">{{ error_message }}</p>
    {% endif %}
    <form method="post" action="/login" class="auth-form">
      <label for="username">Логин</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit" class="btn">Войти</button>
    </form>
  </div>
</section>
{% endblock %}
